name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build fonts
        run: uv run build.py --out dist

      - name: Verify fonts
        run: uv run verify.py dist

      - uses: actions/upload-artifact@v4
        with:
          name: fira-code-sc
          path: dist/*.ttf

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.ttf
            dist/FiraCodeSC.zip
          generate_release_notes: true
